- name: demo on filters
  hosts: local
  connection: local
  vars:
    topics: linux, shell, ansible, terraform
    tagsMap: 
      name: ansible
      project: roboshop
      component: catalogue 
    tagsList:  [
        {
            "key": "name",
            "value": "ansible"
        },
        {
            "key": "project",
            "value": "roboshop"
        },
        {
            "key": "component",
            "value": "catalogue"
        }
    ]    
  tasks:
  - name: 
    ansible.builtin.debug:
      msg: "Hi Nagendra, {{ GREETING | default('Good Morning') }}"

  - name: convert string to list
    ansible.builtin.debug:
      msg: "{{ topics | split(',') }}"

  - name: convert map to list 
    ansible.builtin.debug:
      msg: "{{ tagsMap | dict2items }}"        

  - name: convert map to map 
    ansible.builtin.debug:
      msg: "{{ tagsList | items2dict }}"            